version: 1

# Agent Sync runs on its own repository. The canonical agent instructions live as
# skills under .agent/skills/; AGENTS.md, CLAUDE.md, the Copilot/Gemini files, and the
# .claude skill folders are generated projections. Edit the skills, run `agent sync`,
# never hand-edit a generated section.
targets:
  agents_md:
    enabled: true
    path: AGENTS.md

  claude_md:
    enabled: true
    path: CLAUDE.md

  copilot:
    enabled: true
    path: .github/copilot-instructions.md

  gemini:
    enabled: true
    path: .gemini/GEMINI.md

  claude_skill:
    enabled: true
    path: .claude/skills

policy:
  fail_on_missing_projection: true
  fail_on_outdated_projection: true
  fail_on_manual_edit: true
  allow_target_specific_overrides: true
