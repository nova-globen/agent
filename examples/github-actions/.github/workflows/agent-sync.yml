name: Agent Sync

# Fail the build if any AI-agent instruction file has drifted from its canonical skill.
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Agent Sync
        run: |
          # Pin to a released tag so CI is reproducible; bump it when you upgrade.
          curl -fsSL https://raw.githubusercontent.com/nova-globen/agent/master/scripts/install.sh \
            | bash -s -- v0.2.0-alpha.6
          echo "$HOME/.agent-sync/bin" >> "$GITHUB_PATH"

      - name: Check for agent-instruction drift
        # Exits non-zero if any projection is missing, outdated, or hand-edited,
        # or if the config/skills are invalid.
        run: agent status --fail-on-drift --ci
