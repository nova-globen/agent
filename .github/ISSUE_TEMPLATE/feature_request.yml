name: Feature request
description: Suggest an improvement or new capability.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case or pain point, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Agent Sync to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you use today, or other approaches you weighed.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — links, examples, or how important this is to you.
