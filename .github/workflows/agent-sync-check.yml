name: Agent Sync Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      # End-to-end drift check: scaffold a throwaway repo, sync it, and confirm
      # `status --fail-on-drift --ci` reports no drift (exit 0). This is the same
      # command consuming repositories run in their own pipelines.
      - name: Drift check (end-to-end)
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          cli="$GITHUB_WORKSPACE/src/AgentSync.Cli"
          cd "$work"
          git init -q
          dotnet run -c Release --project "$cli" -- init >/dev/null
          dotnet run -c Release --project "$cli" -- sync >/dev/null
          dotnet run -c Release --project "$cli" -- status --fail-on-drift --ci
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: '1'
