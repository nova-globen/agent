name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. v0.1.0). Used for manual test runs."
        required: false
        default: "v0.0.0-dev"

permissions:
  contents: write
  id-token: write # NuGet.org Trusted Publishing (OIDC) for `dotnet nuget push`

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Determine version
        id: version
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.version }}"
          fi
          # Strip a leading 'v' for the numeric .NET version; keep the tag for names.
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building $tag (version $version)"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Publish artifacts
        id: publish
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          version="${{ steps.version.outputs.version }}"
          runtimes="linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64"
          mkdir -p dist staging

          for rid in $runtimes; do
            stage="staging/$rid"
            rm -rf "$stage"
            mkdir -p "$stage"

            for proj in src/AgentSync.Cli src/AgentSync.GitAgent; do
              dotnet publish "$proj" \
                -c Release \
                -r "$rid" \
                --self-contained true \
                -p:Version="${version}" \
                -p:PublishSingleFile=true \
                -p:IncludeNativeLibrariesForSelfExtract=true \
                -p:DebugType=none \
                -o "$stage"
            done

            cp LICENSE README.md "$stage/"
            # Drop publish metadata that should not ship in the archive.
            rm -f "$stage"/*.pdb "$stage"/*.xml

            archive="agent-sync-${tag}-${rid}"
            if [ "$rid" = "win-x64" ]; then
              ( cd "$stage" && zip -q -r "../../dist/${archive}.zip" agent.exe git-agent.exe LICENSE README.md )
            else
              # Ensure the executables are marked executable inside the tarball.
              chmod +x "$stage/agent" "$stage/git-agent"
              tar -C "$stage" -czf "dist/${archive}.tar.gz" agent git-agent LICENSE README.md
            fi
          done

          ( cd dist && sha256sum * > checksums.txt )
          echo "Artifacts:"
          ls -1 dist

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          {
            echo "## Agent Sync ${tag}"
            echo
            echo "Self-contained builds of the \`agent\` and \`git-agent\` executables."
            echo
            echo "### Install (Linux/macOS)"
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/nova-globen/agent/master/scripts/install.sh | bash -s -- ${tag}"
            echo '```'
            echo
            echo "### Install (Windows PowerShell)"
            echo '```powershell'
            echo "irm https://raw.githubusercontent.com/nova-globen/agent/master/scripts/install.ps1 | iex"
            echo '```'
            echo
            echo "### Assets"
            for f in dist/agent-sync-*; do echo "- \`$(basename "$f")\`"; done
            echo "- \`checksums.txt\`"
            echo
            echo "### Optional local web UI"
            echo "The optional \`agent-sync-ui\` (launched by \`agent ui\`) ships as separate,"
            echo "self-contained \`agent-sync-ui-${tag}-<rid>\` archives, attached to this release"
            echo "by the separate UI packaging job, and as a .NET tool (\`dotnet tool install"
            echo "--global AgentSync.Ui\`). The CLI does not require it; \`agent ui\` installs it"
            echo "on first use (the .NET tool when a \`dotnet\` SDK is present, otherwise the"
            echo "matching release archive)."
            echo
            echo "### Verify checksums"
            echo '```bash'
            echo "sha256sum -c checksums.txt"
            echo '```'
            echo
            echo "See the [installation section of the README](https://github.com/nova-globen/agent#installation) for manual install and build-from-source instructions."
          } > release-notes.md

          # Idempotent so re-runs of the same tag don't fail on an existing release:
          # create it if missing, otherwise refresh its notes and (re)upload assets.
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; updating notes and assets."
            gh release edit "$tag" \
              --title "Agent Sync ${tag}" \
              --notes-file release-notes.md
            gh release upload "$tag" \
              dist/agent-sync-*.tar.gz \
              dist/agent-sync-*.zip \
              dist/checksums.txt \
              --clobber
          else
            gh release create "$tag" \
              dist/agent-sync-*.tar.gz \
              dist/agent-sync-*.zip \
              dist/checksums.txt \
              --title "Agent Sync ${tag}" \
              --notes-file release-notes.md
          fi

      - name: Pack .NET tools
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          mkdir -p nupkgs
          for proj in src/AgentSync.Cli src/AgentSync.GitAgent; do
            dotnet pack "$proj" \
              -c Release \
              -p:Version="${version}" \
              -p:ContinuousIntegrationBuild=true \
              -o nupkgs
          done
          echo "Packages:"
          ls -1 nupkgs

      # Exchanges the job's GitHub OIDC token for a short-lived nuget.org API key.
      # Requires a Trusted Publishing policy on nuget.org (owner: nova-globen,
      # repo: agent, workflow: release.yml) and the NUGET_USER secret (nuget.org
      # profile name, not an email). See RELEASE_CHECKLIST.md.
      - name: NuGet login (Trusted Publishing)
        if: ${{ github.event_name == 'push' }}
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        if: ${{ github.event_name == 'push' }}
        run: |
          set -euo pipefail
          # --skip-duplicate keeps re-runs idempotent (an already-published version is
          # not an error). The synchronous push only confirms NuGet *accepted* the
          # upload; async validation can still reject it (e.g. reserved id / failed
          # scan), so the "Verify" step below is what actually proves publication.
          dotnet nuget push "nupkgs/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Verify packages are live on NuGet.org
        if: ${{ github.event_name == 'push' }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          # Lowercased package ids (NuGet flat-container paths are lowercase).
          ids="agentsync agentsync.git"
          for id in $ids; do
            url="https://api.nuget.org/v3-flatcontainer/${id}/${version}/${id}.${version}.nupkg"
            echo "Waiting for ${id} ${version} to appear on the feed..."
            ok=""
            for i in $(seq 1 20); do   # up to ~10 minutes (20 x 30s)
              code="$(curl -fsS -o /dev/null -w '%{http_code}' "$url" || true)"
              if [ "$code" = "200" ]; then ok=1; echo "  available (HTTP 200)"; break; fi
              echo "  not yet (HTTP ${code}); retry ${i}/20"
              sleep 30
            done
            if [ -z "$ok" ]; then
              echo "::error::${id} ${version} was pushed but never became installable on NuGet.org. The async validation likely rejected it (reserved package id, failed malware scan, or unconfirmed owner). Check the owner email on the NuGet account for the reason."
              exit 1
            fi
          done
          echo "All packages are live on NuGet.org."

      - name: Upload .nupkg as release assets
        if: ${{ github.event_name == 'push' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.version.outputs.tag }}" nupkgs/*.nupkg --clobber

      - name: Upload workflow artifacts (manual runs)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: agent-sync-${{ steps.version.outputs.tag }}
          path: |
            dist/*
            nupkgs/*.nupkg

  # The optional local web UI (`agent-sync-ui`) ships as SEPARATE artifacts. This job runs
  # only after the CLI release job succeeds (`needs: release`), so a UI build failure can
  # never block or alter the already-published CLI release / NuGet packages — it just shows
  # up as a failed (visible, not silent) optional job. The CLI artifacts and the `dotnet
  # tool` packages stay UI-free.
  release-ui:
    name: Release UI (optional, separate)
    needs: release
    runs-on: ubuntu-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Determine version
        id: version
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.version }}"
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building UI for $tag (version $version)"

      - name: Publish UI artifacts
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          version="${{ steps.version.outputs.version }}"
          runtimes="linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64"
          mkdir -p dist-ui staging-ui

          for rid in $runtimes; do
            stage="staging-ui/$rid"
            rm -rf "$stage"
            mkdir -p "$stage"

            # Self-contained, same convention as the CLI artifacts. Blazor static web
            # assets (wwwroot + the *.staticwebassets.endpoints.json manifest) are emitted
            # alongside the single-file host and must travel with it, so the whole publish
            # directory is archived.
            dotnet publish src/AgentSync.Ui.Web/AgentSync.Ui.Web.csproj \
              -c Release \
              -r "$rid" \
              --self-contained true \
              -p:Version="${version}" \
              -p:PublishSingleFile=true \
              -p:IncludeNativeLibrariesForSelfExtract=true \
              -p:DebugType=none \
              -o "$stage"

            cp LICENSE README.md "$stage/"
            rm -f "$stage"/*.pdb "$stage"/*.xml

            archive="agent-sync-ui-${tag}-${rid}"
            if [ "$rid" = "win-x64" ]; then
              ( cd "$stage" && zip -q -r "../../dist-ui/${archive}.zip" . )
            else
              chmod +x "$stage/agent-sync-ui"
              tar -C "$stage" -czf "dist-ui/${archive}.tar.gz" .
            fi
          done

          echo "UI artifacts:"
          ls -1 dist-ui

      - name: Attach UI assets to the release
        if: ${{ github.event_name == 'push' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"

          # Merge the UI checksums into the release's existing checksums.txt without
          # disturbing the CLI entries (idempotent: drop any prior UI lines first).
          gh release download "$tag" -p checksums.txt -O checksums.txt || : > checksums.txt
          grep -v 'agent-sync-ui-' checksums.txt > checksums.merged || :
          ( cd dist-ui && sha256sum agent-sync-ui-* ) >> checksums.merged
          mv checksums.merged checksums.txt

          gh release upload "$tag" \
            dist-ui/agent-sync-ui-*.tar.gz \
            dist-ui/agent-sync-ui-*.zip \
            checksums.txt \
            --clobber

      # The UI also ships as a .NET tool (id AgentSync.Ui, command agent-sync-ui) so
      # `agent ui` can self-install it via `dotnet tool install`. This is packed and pushed
      # in this separate job (not the CLI `release` job) so the CLI's `dotnet tool` packages
      # stay UI-free and a UI packaging failure can never block the already-published CLI.
      - name: Pack UI .NET tool
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          mkdir -p nupkgs-ui
          dotnet pack src/AgentSync.Ui.Web/AgentSync.Ui.Web.csproj \
            -c Release \
            -p:Version="${version}" \
            -p:ContinuousIntegrationBuild=true \
            -o nupkgs-ui
          echo "UI package:"
          ls -1 nupkgs-ui

      # Requires a Trusted Publishing policy on nuget.org for the AgentSync.Ui package id
      # (owner: nova-globen, repo: agent, workflow: release.yml). See RELEASE_CHECKLIST.md.
      - name: NuGet login (Trusted Publishing)
        if: ${{ github.event_name == 'push' }}
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push UI tool to NuGet.org
        if: ${{ github.event_name == 'push' }}
        run: |
          set -euo pipefail
          dotnet nuget push "nupkgs-ui/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Verify UI package is live on NuGet.org
        if: ${{ github.event_name == 'push' }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          id="agentsync.ui" # NuGet flat-container paths are lowercase.
          url="https://api.nuget.org/v3-flatcontainer/${id}/${version}/${id}.${version}.nupkg"
          echo "Waiting for ${id} ${version} to appear on the feed..."
          ok=""
          for i in $(seq 1 20); do   # up to ~10 minutes (20 x 30s)
            code="$(curl -fsS -o /dev/null -w '%{http_code}' "$url" || true)"
            if [ "$code" = "200" ]; then ok=1; echo "  available (HTTP 200)"; break; fi
            echo "  not yet (HTTP ${code}); retry ${i}/20"
            sleep 30
          done
          if [ -z "$ok" ]; then
            echo "::error::${id} ${version} was pushed but never became installable on NuGet.org. The async validation likely rejected it (reserved package id, failed malware scan, or unconfirmed owner). Check the owner email on the NuGet account for the reason."
            exit 1
          fi
          echo "AgentSync.Ui is live on NuGet.org."

      - name: Upload UI .nupkg as release asset
        if: ${{ github.event_name == 'push' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.version.outputs.tag }}" nupkgs-ui/*.nupkg --clobber

      - name: Upload UI workflow artifacts (manual runs)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: agent-sync-ui-${{ steps.version.outputs.tag }}
          path: |
            dist-ui/*
            nupkgs-ui/*.nupkg
